# Pipeline de CI: valida backend, frontend y Docker en cada push y pull_request.
# No modifica la estructura del repositorio; solo comprueba que todo compila y construye correctamente.

name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # -------------------------------------------------------------------------
      # Repositorio
      # -------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # Backend (.NET API en servicios/provider-optimizer-api)
      # -------------------------------------------------------------------------
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend dependencies
        run: dotnet restore servicios/provider-optimizer-api

      - name: Build backend
        run: dotnet build servicios/provider-optimizer-api --no-restore -c Release

      # Ejecuta tests si existe el proyecto ProviderOptimizerService.Tests en la solución.
      # Si no hay proyectos de prueba, dotnet test suele terminar con éxito (0 tests).
      - name: Run backend tests
        run: dotnet test servicios/provider-optimizer-api --no-build -c Release --verbosity normal
        continue-on-error: true

      # -------------------------------------------------------------------------
      # Frontend (Node en frontend/provider-ui)
      # -------------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend/provider-ui
          npm install

      - name: Build frontend
        run: |
          cd frontend/provider-ui
          npm run build

      # -------------------------------------------------------------------------
      # Docker (valida que las imágenes se construyan con docker compose)
      # -------------------------------------------------------------------------
      - name: Build Docker images
        run: docker compose build

