services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: providers
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d providers"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./servicios/provider-optimizer-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=providers;Username=postgres;Password=postgres"
      JWT_SECRET: "your-super-secret-jwt-key-min-32-characters-long"

  frontend:
    build: ./frontend/provider-ui
    ports:
      - "3000:80"
    depends_on:
      - api
